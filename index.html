<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="다은이네" />
    <title>다은이네 가족 대시보드</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="shell.css" />
  </head>
  <body>
    <div class="hub">
      <aside class="sidebar" aria-label="대시보드 목록">
        <div class="sidebar__brand">
          <span class="sidebar__badge">다은이네</span>
          <h1 class="sidebar__title">가족 대시보드</h1>
        </div>
        <nav class="sidebar__nav">
          <button
            type="button"
            class="nav-item nav-item--active"
            data-view="household"
            aria-current="page"
          >
            <span class="nav-item__icon" aria-hidden="true">₩</span>
            <span class="nav-item__text">다은이네 가계현황</span>
          </button>
          <button type="button" class="nav-item" data-view="schedule">
            <span class="nav-item__icon nav-item__icon--cal" aria-hidden="true"></span>
            <span class="nav-item__text">다은이네 일정공유</span>
          </button>
        </nav>
        <div class="sidebar__footer">
          <button type="button" class="btn btn--outline btn--sm" id="installPwa" hidden>앱 설치</button>
          <p class="sidebar__note">아빠 · 엄마 · 다은이</p>
        </div>
      </aside>

      <main class="main">
        <iframe
          id="viewFrame"
          class="main__frame"
          title="다은이네 가계현황 대시보드"
          src="household.html"
        ></iframe>
      </main>
    </div>
    <script src="shell.js"></script>
  </body>
</html>
