<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2d6a4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="다은이네 가계" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
    <title>다은이네 가계현황 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <script>
      if (window.self !== window.top) document.documentElement.classList.add("in-hub");
    </script>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__badge">가족 가계부</span>
          <h1>다은이네 가계현황 대시보드</h1>
          <p class="header__family">아빠 · 엄마 · 다은이</p>
        </div>
        <div class="header__actions">
          <div class="header__month">
            <button type="button" class="btn btn--ghost" id="prevMonth" aria-label="이전 달">‹</button>
            <input type="month" id="monthPicker" class="month-picker" />
            <button type="button" class="btn btn--ghost" id="nextMonth" aria-label="다음 달">›</button>
          </div>
          <div class="toolbar">
            <button type="button" class="btn btn--outline btn--sm" id="exportCsv">CSV보내기</button>
            <button type="button" class="btn btn--outline btn--sm" id="installPwa" hidden>앱 설치</button>
          </div>
        </div>
      </header>

      <div id="budgetAlerts" class="alerts" hidden></div>

      <section class="summary" id="summaryCards"></section>

      <section class="panel panel--budget">
        <div class="panel__head">
          <h2>월 예산 목표</h2>
          <p class="panel__hint">카테고리별 목표 금액을 설정하면 초과 시 알림이 표시됩니다.</p>
        </div>
        <div class="budget-grid" id="budgetSection"></div>
        <div class="panel__actions">
          <button type="button" class="btn btn--primary" id="saveBudget">예산 저장</button>
        </div>
      </section>

      <section class="charts">
        <article class="card chart-card">
          <h2>소득 구성</h2>
          <div class="chart-wrap"><canvas id="incomeChart"></canvas></div>
        </article>
        <article class="card chart-card">
          <h2>지출 구성</h2>
          <div class="chart-wrap"><canvas id="expenseChart"></canvas></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel__head">
          <h2>월 소득</h2>
          <p class="panel__hint">고정 월급은 매월 자동 반영됩니다. 부가소득은 해당 월에만 추가됩니다.</p>
        </div>
        <div class="income-grid" id="incomeSection"></div>
        <div class="panel__actions">
          <button type="button" class="btn btn--primary" id="saveIncome">소득 저장</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel__head">
          <h2>월 지출</h2>
          <p class="panel__hint">유동성 · 투자성 · 고정성으로 구분해 기록하세요. 투자성·고정성은 저장 시 다음 달에도 자동 반영됩니다.</p>
        </div>
        <div class="expense-tabs" role="tablist">
          <button type="button" class="tab tab--active" data-category="fluid">유동성</button>
          <button type="button" class="tab" data-category="investment">투자성</button>
          <button type="button" class="tab" data-category="fixed">고정성</button>
        </div>
        <div id="expensePanel"></div>
      </section>

      <footer class="footer">
        <span>데이터는 새로고침하면 초기화됩니다</span>
        <button type="button" class="btn btn--danger btn--sm" id="resetData">전체 초기화</button>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
